<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>요한계시록 암기카드 1~11장 (개역한글)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #faf6ee; color: #3d2b0e; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #5c3d1a 0%, #3d2b0e 100%);
    padding: 18px 20px; text-align: center;
    border-bottom: 3px solid #c0853a;
  }
  header h1 { font-size: 1.3rem; color: #fff3e0; letter-spacing: 0.5px; }
  header p  { font-size: 0.8rem; color: #e8c98a; margin-top: 5px; }

  .notice {
    background: #fff8ee; border-left: 4px solid #c0853a;
    padding: 10px 16px; font-size: 0.8rem; color: #7a5a2a; line-height: 1.5;
  }

  /* Chapter nav */
  .ch-nav {
    background: #5c3d1a;
    padding: 10px 14px; overflow-x: auto; white-space: nowrap;
    border-bottom: 2px solid #c0853a;
  }
  .ch-nav button {
    display: inline-block; margin: 3px; padding: 7px 14px;
    background: #7a5230; color: #fff3e0; border: 1px solid #c0853a;
    border-radius: 20px; font-size: 0.82rem; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .ch-nav button.active { background: #c0853a; color: #fff; font-weight: bold; border-color: #c0853a; }
  .ch-nav button:hover:not(.active) { background: #9c6a3a; color: #fff; }

  /* Progress */
  .progress-bar { height: 6px; background: #e8dfc8; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c0853a, #e8a855); transition: width 0.3s; }
  .stats { text-align: center; padding: 8px; font-size: 0.82rem; color: #9c7f56; }
  .stats span { color: #c0853a; font-weight: bold; }

  /* Section */
  .ch-section { display: none; padding: 14px; }
  .ch-section.active { display: block; }

  .ch-header { text-align: center; margin-bottom: 14px; }
  .ch-header h2 { font-size: 1.15rem; color: #5c3d1a; font-weight: bold; }
  .ch-header p  { font-size: 0.8rem; color: #9c7f56; margin-top: 3px; }

  /* Card */
  .card {
    background: #ffffff; border: 1px solid #e8dfc8;
    border-radius: 12px; margin-bottom: 10px;
    cursor: pointer; transition: all 0.2s; overflow: hidden;
    box-shadow: 0 1px 4px rgba(92,61,26,0.08);
  }
  .card:hover { border-color: #c0853a; background: #fff3e0; }
  .card.revealed { border-color: #c0853a; box-shadow: 0 2px 8px rgba(192,133,58,0.25); }

  .card-q {
    padding: 13px 15px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .card-ref { font-size: 1rem; font-weight: bold; color: #5c3d1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 80px); }
  .card-hint { font-size: 0.72rem; color: #c0853a; white-space: nowrap; }
  .card.revealed .card-hint { color: #9c7f56; }

  .card-a {
    display: none;
    padding: 13px 15px; border-top: 1px solid #e8dfc8;
    font-size: 0.93rem; line-height: 1.8; color: #3d2b0e;
    background: #fffdf8;
  }
  .card.revealed .card-a { display: block; }

  .btn-row { display: flex; gap: 8px; margin: 4px 0 10px; }
  .ctrl-btn {
    flex: 1; padding: 9px; background: #fff;
    color: #5c3d1a; border: 1px solid #e8dfc8; border-radius: 8px;
    font-size: 0.78rem; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }

  .ctrl-btn.active-swap { background: #c0853a; color: #fff; border-color: #c0853a; }

  .swap-mode .card-ref  { color: #3d2b0e; font-size: 0.88rem; font-weight: normal;

  .swap-mode .card-q    { flex-direction: column; align-items: flex-start; gap: 6px; }
  .swap-mode .card-q .card-hint { color: #c0853a; }
  .swap-mode .card-a    { font-size: 1rem; font-weight: bold; color: #5c3d1a; }
  .swap-mode .card.revealed .card-a { display: block; }

  .mode-badge {
    display: inline-block; margin: 0 auto 8px;
    padding: 4px 12px; border-radius: 12px;
    font-size: 0.72rem; background: #c0853a; color: #fff;
    text-align: center;
  }
</style>
</head>

// ---- Render ----
const navEl      = document.getElementById('chNav');
const contentEl  = document.getElementById('content');
const pFill      = document.getElementById('pFill');
const statsBar   = document.getElementById('statsBar');

let revealed = {};   // { ch: Set(indices) }
let currentCh = 1;

function renderNav() {
  navEl.innerHTML = '';
  chapters.forEach(c => {
    const btn = document.createElement('button');
    btn.textContent = c.title;
    btn.dataset.ch = c.ch;
    if (c.ch === currentCh) btn.classList.add('active');
    btn.onclick = () => switchCh(c.ch);
    navEl.appendChild(btn);
  });
}

function switchCh(ch) {
  currentCh = ch;
  document.querySelectorAll('.ch-section').forEach(s => s.classList.remove('active'));
  document.querySelector(`[data-section="${ch}"]`).classList.add('active');
  document.querySelectorAll('.ch-nav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.ch-nav button[data-ch="${ch}"]`).classList.add('active');
  updateStats(ch);
  const btn = document.querySelector(`.ch-nav button[data-ch="${ch}"]`);
  navEl.scrollLeft = btn.offsetLeft - navEl.offsetWidth / 2 + btn.offsetWidth / 2;
}

function updateStats(ch) {
  const data  = chapters.find(c => c.ch === ch);
  const total = data.verses.length;
  const done  = (revealed[ch] || new Set()).size;
  const pct   = Math.round(done / total * 100);
  pFill.style.width = pct + '%';
  statsBar.innerHTML = `<span>${done}</span> / ${total}절 확인 완료 (${pct}%)`;
}

function toggleCard(card, ch, idx) {
  card.classList.toggle('revealed');
  if (!revealed[ch]) revealed[ch] = new Set();
  if (card.classList.contains('revealed')) revealed[ch].add(idx);
  else revealed[ch].delete(idx);
  updateStats(ch);
}

function renderContent() {
  contentEl.innerHTML = '';
  chapters.forEach(c => {
    const sec = document.createElement('div');
    sec.className = 'ch-section' + (c.ch === currentCh ? ' active' : '');
    sec.dataset.section = c.ch;

    sec.innerHTML = `
      <div class="ch-header">
        <h2>${c.title}</h2>
        <p>총 ${c.count}절</p>
        <div class="mode-badge" id="badge-${c.ch}"></div>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" onclick="openAll(${c.ch})">모두 열기</button>
        <button class="ctrl-btn" onclick="closeAll(${c.ch})">모두 닫기</button>
      </div>
      <div class="btn-row">
        <button class="ctrl-btn" id="shuffleBtn-${c.ch}"  onclick="shuffleCards(${c.ch})">🔀 랜덤 섞기</button>
        <button class="ctrl-btn" id="restoreBtn-${c.ch}"  onclick="restoreOrder(${c.ch})" style="display:none">↩ 순서 되돌리기</button>
        <button class="ctrl-btn" id="swapBtn-${c.ch}"     onclick="toggleSwap(${c.ch})">🔄 질문↔답 변경</button>
      </div>
    `;

    c.verses.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.ch    = c.ch;
      card.dataset.idx   = i;
      card.dataset.order = i;
      card.innerHTML = `
        <div class="card-q">
          <span class="card-ref">${v[0]}</span>
          <span class="card-hint">터치하여 성구 보기 ▼</span>
        </div>
        <div class="card-a">${v[1]}</div>
      `;
      card.onclick = () => toggleCard(card, c.ch, i);
      sec.appendChild(card);
    });

    contentEl.appendChild(sec);
  });
}

function openAll(ch) {
  if (!revealed[ch]) revealed[ch] = new Set();
  document.querySelectorAll(`[data-section="${ch}"] .card`).forEach((card, i) => {
    card.classList.add('revealed');
    revealed[ch].add(i);
  });
  updateStats(ch);
}

function closeAll(ch) {
  document.querySelectorAll(`[data-section="${ch}"] .card`).forEach(card => {
    card.classList.remove('revealed');
  });
  revealed[ch] = new Set();
  updateStats(ch);
}

// 랜덤 섞기
function shuffleCards(ch) {
  const sec   = document.querySelector(`[data-section="${ch}"]`);
  const cards = Array.from(sec.querySelectorAll('.card'));

  // Fisher-Yates shuffle
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }

  cards.forEach(c => {
    c.classList.remove('revealed');
    sec.appendChild(c);
  });

  revealed[ch] = new Set();
  updateStats(ch);

  // 섞기 완료 피드백 + 되돌리기 버튼 표시
  const shuffleBtn  = document.getElementById(`shuffleBtn-${ch}`);
  const restoreBtn  = document.getElementById(`restoreBtn-${ch}`);
  shuffleBtn.textContent = '✅ 섞기 완료!';
  setTimeout(() => { shuffleBtn.textContent = '🔀 다시 섞기'; }, 1200);
  restoreBtn.style.display = '';
}

// 원래 순서로 복원
function restoreOrder(ch) {
  const sec   = document.querySelector(`[data-section="${ch}"]`);
  const cards = Array.from(sec.querySelectorAll('.card'));

  cards.sort((a, b) => Number(a.dataset.order) - Number(b.dataset.order));

  cards.forEach(c => {
    c.classList.remove('revealed');
    sec.appendChild(c);
  });

  revealed[ch] = new Set();
  updateStats(ch);

  // 버튼 상태 복원
  const shuffleBtn = document.getElementById(`shuffleBtn-${ch}`);
  const restoreBtn = document.getElementById(`restoreBtn-${ch}`);
  shuffleBtn.textContent   = '🔀 랜덤 섞기';
  restoreBtn.style.display = 'none';
}

// 질문↔답 변경 토글
let swapMode = {}; // { ch: bool }

function toggleSwap(ch) {
  swapMode[ch] = !swapMode[ch];
  const sec   = document.querySelector(`[data-section="${ch}"]`);
  const btn   = document.getElementById(`swapBtn-${ch}`);
  const badge = document.getElementById(`badge-${ch}`);

  sec.querySelectorAll('.card').forEach(card => {
    const refEl = card.querySelector('.card-ref');
    const ansEl = card.querySelector('.card-a');
    const hint  = card.querySelector('.card-hint');

    if (swapMode[ch]) {
      // 성구 텍스트 → 질문 / 장절 번호 → 숨겨진 답
      const origRef = refEl.dataset.origRef || refEl.textContent;
      const origAns = ansEl.dataset.origAns || ansEl.textContent;
      refEl.dataset.origRef = origRef;
      ansEl.dataset.origAns = origAns;

      refEl.textContent = origAns;   // 성구 본문이 질문으로
      ansEl.textContent = origRef;   // 장절 번호가 답으로
      hint.textContent  = '터치하여 장절 보기 ▼';
    } else {
      // 원래대로 복원
      if (refEl.dataset.origRef) {
        refEl.textContent = refEl.dataset.origRef;
        ansEl.textContent = ansEl.dataset.origAns;
        delete refEl.dataset.origRef;
        delete ansEl.dataset.origAns;
      }
      hint.textContent = '터치하여 성구 보기 ▼';
    }
    card.classList.remove('revealed');
  });

  if (swapMode[ch]) {
    btn.textContent = '🔄 원래대로';
    btn.classList.add('active-swap');
    if (badge) badge.textContent = '📖 성구 → 장절 찾기 모드';
  } else {
    btn.textContent = '🔄 질문↔답 변경';
    btn.classList.remove('active-swap');
    if (badge) badge.textContent = '';
  }

  revealed[ch] = new Set();
  updateStats(ch);
}

renderNav();
renderContent();
updateStats(currentCh);
</script>
</body>
</html>
